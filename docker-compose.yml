services:
  postgres:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-twinchat}
      POSTGRES_USER: ${POSTGRES_USER:-twinchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-twinchat_secure_pass_2024}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-twinchat} -d ${POSTGRES_DB:-twinchat}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      POSTGRES_DB: ${POSTGRES_DB:-twinchat}
      POSTGRES_USER: ${POSTGRES_USER:-twinchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-twinchat_secure_pass_2024}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application
          --bind 0.0.0.0:8000
          --workers 4
          --threads 2
          --timeout 120
          --access-logfile -
          --error-logfile -
      "

  websocket:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      POSTGRES_DB: ${POSTGRES_DB:-twinchat}
      POSTGRES_USER: ${POSTGRES_USER:-twinchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-twinchat_secure_pass_2024}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    command: >
      daphne -b 0.0.0.0 -p 8001 config.asgi:application

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - backend
      - websocket

volumes:
  postgres_data:
  static_files:
  media_files:
